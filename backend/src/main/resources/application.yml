spring:
  application:
    name: bharat-runner

  datasource:
    url: jdbc:postgresql://localhost:5432/bharat_runner
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

game:
  planet-radius: 50
  max-players-per-room: 32
  tick-rate: 20  # server ticks per second
